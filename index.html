<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Cadastro de POP - OntoSOP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body { background-color: #f8f9fa; padding: 40px; }
        .card { box-shadow: 0 4px 6px rgba(0,0,0,0.1); border: none; }
        .step-entry { border-left: 5px solid #0d6efd; background-color: white; }
        .gen-label { transition: all 0.3s; }
        .category-header { border-bottom: 2px solid #dee2e6; padding-bottom: 5px; margin-top: 20px; text-transform: uppercase; font-size: 0.85rem; letter-spacing: 1px; }
    </style>
</head>
<body>

<div class="container">
    <h2 class="mb-4 text-primary"><i class="bi bi-file-earmark-medical"></i> Cadastro de POP - OntoSOP</h2>
    
    <form id="popForm">
        <div class="card mb-4">
            <div class="card-header bg-primary text-white fw-bold">Identificação e Ciclo de Vida</div>
            <div class="card-body">
                <div class="row g-3">
                    <div class="col-md-8">
                        <label class="form-label">Nome do POP (sop:name)</label>
                        <input type="text" class="form-control" name="name" required>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Número (sop:number)</label>
                        <input type="number" class="form-control" name="number">
                    </div>
                    <div class="col-12">
                        <label class="form-label fw-bold">Organizações Responsáveis (sop:responsible)</label>
                        <div id="responsible_container">
                            <div class="input-group mb-2">
                                <input type="text" class="form-control" name="responsible_org[]" placeholder="Ex: Lab Química / IFF" required>
                                <button type="button" class="btn btn-outline-primary" onclick="addListField('responsible_container', 'responsible_org[]')">+</button>
                            </div>
                        </div>
                     </div>
                     <div class="col-12">
                    <label class="form-label fw-bold">Classificações / Áreas (skos:Concept)</label>
                    <div id="classification_container">
                        <div class="input-group mb-2">
                            <input type="text" class="form-control" name="classification[]" placeholder="Ex: Higienização, Assistência Hospitalar, Administrativo">
                            <button type="button" class="btn btn-outline-primary" onclick="addListField('classification_container', 'classification[]')">+</button>
                        </div>
                    </div>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Versão (sop:version)</label>
                        <input type="text" class="form-control" name="version" placeholder="1.0">
                    </div>
                    <div class="col-md-4"><label class="form-label text-muted small">Criação</label><input type="date" class="form-control" name="creationDate"></div>
                    <div class="col-md-4"><label class="form-label text-muted small">Aprovação</label><input type="date" class="form-control" name="approvalDate"></div>
                    <div class="col-md-4"><label class="form-label text-muted small">Revisão</label><input type="date" class="form-control" name="revisionDate"></div>
                    <div class="col-md-6">
                        <label class="form-label">Status</label>
                        <select class="form-select" name="status">
                            <option value="draft">Rascunho (Draft)</option>
                            <option value="approved">Aprovado (Approved)</option>
                            <option value="published">Publicado (Published)</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Validade</label>
                        <input type="date" class="form-control" name="validity">
                    </div>
                    <div class="col-12">
                        <label class="form-label">Descrição Geral</label>
                        <textarea class="form-control" name="description" rows="2"></textarea>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mb-4">
            <div class="card-header bg-warning text-dark fw-bold">Glossário: Termos e Siglas (skos:Concept)</div>
            <div class="card-body">
                <div id="terms_container">
                    <div class="row g-2 mb-3 border-bottom pb-3">
                        <div class="col-md-4">
                            <label class="form-label small fw-bold">Termo ou Sigla</label>
                            <input type="text" class="form-control form-control-sm" name="term_name[]" placeholder="Ex: IRAS">
                        </div>
                        <div class="col-md-7">
                            <label class="form-label small fw-bold">Definição / Significado</label>
                            <input type="text" class="form-control form-control-sm" name="term_definition[]" placeholder="Ex: Infecções Relacionadas à Assistência à Saúde">
                        </div>
                        <div class="col-md-1">
                            <label class="form-label">&nbsp;</label>
                            <button type="button" class="btn btn-sm btn-outline-primary w-100" onclick="addTermField()">+</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mb-4">
            <div class="card-header bg-dark text-white fw-bold">Responsabilidades e Autoria (foaf:Agent)</div>
            <div class="card-body">
                <div class="row g-3">
                    <div class="col-md-4 border-end">
                        <label class="form-label small fw-bold">ELABORADO POR (sop:createdBy)</label>
                        <div id="creator_container">
                            <div class="p-2 border rounded bg-light mb-2">
                                <input type="text" class="form-control form-control-sm mb-1" name="creator_name[]">
                                <select class="form-select form-select-sm" name="creator_type[]"><option value="Person">Pessoa</option><option value="Group">Grupo</option></select>
                            </div>
                        </div>
                        <button type="button" class="btn btn-sm btn-outline-dark w-100" onclick="addAgentField('creator_container', 'creator')">+ Adicionar Autor</button>
                    </div>

                    <div class="col-md-4 border-end">
                        <label class="form-label small fw-bold">REVISADO POR (sop:checkedBy)</label>
                        <div id="checker_container">
                            <div class="p-2 border rounded bg-light mb-2">
                                <input type="text" class="form-control form-control-sm mb-1" name="checker_name[]">
                                <select class="form-select form-select-sm" name="checker_type[]"><option value="Person">Pessoa</option><option value="Group">Grupo</option></select>
                            </div>
                        </div>
                        <button type="button" class="btn btn-sm btn-outline-dark w-100" onclick="addAgentField('checker_container', 'checker')">+ Adicionar Revisor</button>
                    </div>

                    <div class="col-md-4">
                        <label class="form-label small fw-bold">APROVADO POR (sop:approvedBy)</label>
                        <div id="approver_container">
                            <div class="p-2 border rounded bg-light mb-2">
                                <input type="text" class="form-control form-control-sm mb-1" name="approver_name[]">
                                <select class="form-select form-select-sm" name="approver_type[]"><option value="Group">Grupo</option><option value="Person">Pessoa</option></select>
                            </div>
                        </div>
                        <button type="button" class="btn btn-sm btn-outline-dark w-100" onclick="addAgentField('approver_container', 'approver')">+ Adicionar Aprovador</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mb-4 border-primary shadow-sm">
            <div class="card-header bg-primary text-white fw-bold text-center small">PADRÕES GERAIS DE EXECUÇÃO</div>
            <div class="card-body bg-light row g-3">
                <div class="col-md-6">
                    <label class="small fw-bold">Executor Padrão</label>
                    <div class="input-group">
                        <input type="text" class="form-control form-control-sm" id="general_performer_name" oninput="updateStepDefaults()">
                        <select class="form-select form-select-sm" id="general_performer_type" onchange="updateStepDefaults()"><option value="RolePerformer">Papel</option><option value="OrganizationPerformer">Org</option></select>
                    </div>
                </div>
                <div class="col-md-6">
                    <label class="small fw-bold">Local Padrão</label>
                    <div class="input-group">
                        <input type="text" class="form-control form-control-sm" id="general_place_name" oninput="updateStepDefaults()">
                        <select class="form-select form-select-sm" id="general_place_type" onchange="updateStepDefaults()"><option value="SitePlace">Físico</option><option value="OrganizationPlace">Setor</option></select>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mb-4">
            <div class="card-header bg-secondary text-white d-flex justify-content-between align-items-center fw-bold">
                Etapas (sop:Step)
                <button type="button" class="btn btn-sm btn-light" onclick="addStep()"><i class="bi bi-plus-lg"></i> Etapa</button>
            </div>
            <div class="card-body" id="stepsContainer"></div>
        </div>

        <div class="card mb-4">
            <div class="card-header bg-info text-white fw-bold">Gestão de Itens do POP (sop:SopItem)</div>
            <div class="card-body">
                <div class="row g-3 align-items-end border-bottom pb-4 mb-4">
                    <div class="col-md-4">
                        <label class="form-label small fw-bold">1. Selecione o Tipo de Item</label>
                        <select class="form-select" id="temp_item_type" onchange="toggleItemFields()">
                            <option value="">Escolha um tipo...</option>
                            <option value="Objective">Objetivo</option>
                            <option value="Material">Material</option>
                            <option value="Note">Nota</option>
                            <option value="SafeInstruction">Segurança</option>
                            <option value="Scope">Escopo</option>
                            <option value="BibliographicReference">Referência Bibliográfica</option>
                            <option value="UsageSituation">Situação de Uso</option>
                            <option value="ExpectedResults">Resultados Esperados</option>
                        </select>
                    </div>
                    <div id="item_fields_area" class="col-md-8 d-none">
                        <div class="row g-2">
                            <div class="col-md-8">
                                <label class="form-label small fw-bold" id="label_item_name">Conteúdo</label>
                                <input type="text" class="form-control" id="temp_item_name">
                            </div>
                            <div class="col-md-2">
                                <label class="form-label small fw-bold">Ordem</label>
                                <input type="number" class="form-control" id="temp_item_discriminator">
                            </div>
                            <div class="col-md-2">
                                <button type="button" class="btn btn-primary w-100" onclick="saveItemToList()">Salvar</button>
                            </div>
                        </div>
                    </div>
                </div>
                <div id="categorized_items_area">
                    <p id="noItemsMessage" class="text-center text-muted small">Nenhum item adicionado ainda.</p>
                </div>
            </div>
        </div>

        <div class="row g-3 mb-5">
            <div class="col-md-9">
                <button type="submit" class="btn btn-success btn-lg w-100 shadow">
                    <i class="bi bi-hdd-fill"></i> Gerar Base de Dados POP (RDF)
                </button>
            </div>
            <div class="col-md-3">
                <button type="button" class="btn btn-outline-danger btn-lg w-100 shadow" onclick="confirmClearForm()">
                    <i class="bi bi-trash3"></i> Limpar Tudo
                </button>
            </div>
        </div>
    </form>
</div>

<script>
    let stepCount = 0;
    let sopItemsList = [];

    const itemCategories = {
        'Objective': { label: 'Objetivos', class: 'bg-primary' },
        'Material': { label: 'Materiais', class: 'bg-success' },
        'Note': { label: 'Notas e Observações', class: 'bg-warning text-dark' },
        'SafeInstruction': { label: 'Instruções de Segurança', class: 'bg-danger' },
        'Scope': { label: 'Escopo', class: 'bg-secondary' },
        'BibliographicReference': { label: 'Referências Bibliográficas', class: 'bg-dark' },
        'UsageSituation': { label: 'Situação de Uso', class: 'bg-info text-dark' },
        'ExpectedResults': { label: 'Resultados Esperados', class: 'bg-light text-dark border' }
    };

    function confirmClearForm() {
        if (confirm("Tem certeza que deseja limpar todo o formulário? Todos os dados não salvos serão perdidos.")) {
            clearAllForm();
        }
    }
    

    function clearAllForm() {
        // 1. Reseta os campos padrão do HTML (inputs, selects, textareas)
        document.getElementById('popForm').reset();

        // 2. Limpa as variáveis globais de controle
        sopItemsList = [];
        stepCount = 0;

        // 3. Limpa os containers dinâmicos (Etapas, Itens e Glossário)
        document.getElementById('stepsContainer').innerHTML = '';
        document.getElementById('categorized_items_area').innerHTML = '<p id="noItemsMessage" class="text-center text-muted small">Nenhum item adicionado ainda.</p>';
        
        // 4. Limpa containers de listas (Responsáveis, Classificações e Termos)
        // Deixa apenas o primeiro campo vazio para cada um
        resetDynamicContainer('responsible_container', 'responsible_org[]');
        resetDynamicContainer('classification_container', 'classification[]');
        
        const termsContainer = document.getElementById('terms_container');
        if (termsContainer) {
            termsContainer.innerHTML = `
                <div class="row g-2 mb-3 border-bottom pb-3">
                    <div class="col-md-4"><input type="text" class="form-control form-control-sm" name="term_name[]"></div>
                    <div class="col-md-7"><input type="text" class="form-control form-control-sm" name="term_definition[]"></div>
                    <div class="col-md-1"><button type="button" class="btn btn-sm btn-outline-primary w-100" onclick="addTermField()">+</button></div>
                </div>`;
        }

        // 5. Reinicia o formulário com a primeira etapa padrão
        addStep();

        // 6. Reseta o seletor de itens e o incremento de ordem
        document.getElementById('temp_item_type').value = '';
        document.getElementById('item_fields_area').classList.add('d-none');
        
        window.scrollTo(0, 0); // Volta para o topo da página
    }

    // Função auxiliar para resetar containers de input-group
    function resetDynamicContainer(containerId, fieldName) {
        const container = document.getElementById(containerId);
        if (container) {
            container.innerHTML = `
                <div class="input-group mb-2">
                    <input type="text" class="form-control" name="${fieldName}">
                    <button type="button" class="btn btn-outline-primary" onclick="addListField('${containerId}', '${fieldName}')">+</button>
                </div>`;
        }
    }

    function toggleItemFields() {
        const type = document.getElementById('temp_item_type').value;
        const area = document.getElementById('item_fields_area');
        const label = document.getElementById('label_item_name');
        const inputDisc = document.getElementById('temp_item_discriminator');
        if (type) {
            area.classList.remove('d-none');
            label.innerText = `Conteúdo do(a) ${itemCategories[type].label}`;
            const count = sopItemsList.filter(it => it.type === type).length;
            inputDisc.value = count + 1;
        } else { area.classList.add('d-none'); }
    }

    function saveItemToList() {
        const type = document.getElementById('temp_item_type').value;
        const name = document.getElementById('temp_item_name').value;
        const disc = document.getElementById('temp_item_discriminator').value;
        if (!name) return alert("Preencha o conteúdo!");
        sopItemsList.push({ type, name, discriminator: disc });
        document.getElementById('temp_item_name').value = '';
        toggleItemFields(); // Atualiza contador
        renderCategorizedItems();
    }

    function renderCategorizedItems() {
        const container = document.getElementById('categorized_items_area');
        container.innerHTML = '';
        if (sopItemsList.length === 0) {
            container.innerHTML = '<p class="text-center text-muted small">Nenhum item adicionado ainda.</p>';
            return;
        }
        Object.keys(itemCategories).forEach(type => {
            const items = sopItemsList.filter(it => it.type === type);
            if (items.length > 0) {
                let html = `<div class="mb-4"><h6 class="category-header fw-bold text-muted mb-2"><span class="badge ${itemCategories[type].class} me-2">${items.length}</span>${itemCategories[type].label}</h6><ul class="list-group list-group-flush shadow-sm rounded">`;
                items.forEach(it => {
                    html += `<li class="list-group-item d-flex justify-content-between align-items-center"><div><span class="text-muted small me-3">#${it.discriminator}</span><span>${it.name}</span></div><button type="button" class="btn btn-sm text-danger" onclick="removeItemGlobal('${it.type}', '${it.name}')"><i class="bi bi-trash"></i></button></li>`;
                });
                html += '</ul></div>';
                container.insertAdjacentHTML('beforeend', html);
            }
        });
    }

    function removeItemGlobal(type, name) {
        sopItemsList = sopItemsList.filter(it => !(it.type === type && it.name === name));
        renderCategorizedItems();
        toggleItemFields();
    }

    // --- FUNÇÕES DE ETAPA ---
    function addStep() {
        stepCount++;
        const container = document.getElementById('stepsContainer');
        const genPerfName = document.getElementById('general_performer_name').value;
        const genPerfType = document.getElementById('general_performer_type').value;
        const genPlaceName = document.getElementById('general_place_name').value;
        const genPlaceType = document.getElementById('general_place_type').value;

        const html = `
            <div class="step-entry border p-3 rounded mb-4 shadow-sm" id="step_${stepCount}">
                <div class="d-flex justify-content-between mb-3">
                    <h5 class="text-primary mb-0">Etapa #${stepCount}</h5>
                    <div class="form-check form-switch"><input class="form-check-input" type="checkbox" id="customCheck_${stepCount}" onchange="toggleCustom(${stepCount})"><label class="small ms-2">Personalizar</label></div>
                    <button type="button" class="btn btn-outline-danger btn-sm" onclick="removeStep(${stepCount})">Remover</button>
                </div>
                <div class="row g-2">
                    
                    <div class="col-12 mb-2"><label class="small fw-bold">Ação</label><textarea class="form-control" name="step_name[]" rows="2" required></textarea></div>
                    <div class="col-md-6"><div class="p-2 border rounded bg-light"><label class="small fw-bold text-muted">EXECUTOR</label><input type="text" class="form-control form-control-sm mb-1 step-perf-name" name="step_performer_name[]" value="${genPerfName}" readonly><input type="hidden" name="step_performer_type[]" class="step-perf-type" value="${genPerfType}"><span class="badge bg-secondary gen-label">Padrão</span></div></div>
                    <div class="col-md-6"><div class="p-2 border rounded bg-light"><label class="small fw-bold text-muted">LOCAL</label><input type="text" class="form-control form-control-sm mb-1 step-place-name" name="step_place_name[]" value="${genPlaceName}" readonly><input type="hidden" name="step_place_type[]" class="step-place-type" value="${genPlaceType}"><span class="badge bg-secondary gen-label">Padrão</span></div></div>
                    <div class="col-md-6 mt-3"><label class="small text-success fw-bold">Pré-condição</label><textarea class="form-control form-control-sm" name="step_pre_condition[]"></textarea></div>
                    <div class="col-md-6 mt-3"><label class="small text-danger fw-bold">Pós-condição</label><textarea class="form-control form-control-sm" name="step_pos_condition[]"></textarea></div>
                    <div class="col-md-4 mt-2"><label class="small fw-bold">Próxima Etapa (#)</label><input type="number" class="form-control form-control-sm" name="step_target_id[]"></div>
                    <div class="col-md-8 mt-2"><label class="small fw-bold">Condição de Guarda</label><input type="text" class="form-control form-control-sm" name="step_guard_condition[]"></div>
                </div>
            </div>`;
        container.insertAdjacentHTML('beforeend', html);
    }

    function removeStep(id) { if(confirm("Remover etapa?")) document.getElementById(`step_${id}`).remove(); }

    function updateStepDefaults() {
        const perf = document.getElementById('general_performer_name').value;
        const typeP = document.getElementById('general_performer_type').value;
        const place = document.getElementById('general_place_name').value;
        const typeL = document.getElementById('general_place_type').value;
        document.querySelectorAll('.step-entry').forEach(step => {
            const id = step.id.split('_')[1];
            if (!document.getElementById(`customCheck_${id}`).checked) {
                step.querySelector('.step-perf-name').value = perf;
                step.querySelector('.step-perf-type').value = typeP;
                step.querySelector('.step-place-name').value = place;
                step.querySelector('.step-place-type').value = typeL;
            }
        });
    }

    function toggleCustom(id) {
        const isCustom = document.getElementById(`customCheck_${id}`).checked;
        const step = document.getElementById(`step_${id}`);
        const inputs = [step.querySelector('.step-perf-name'), step.querySelector('.step-place-name')];
        const labels = step.querySelectorAll('.gen-label');
        inputs.forEach(i => isCustom ? i.removeAttribute('readonly') : i.setAttribute('readonly', true));
        labels.forEach(l => {
            l.innerText = isCustom ? 'Personalizado' : 'Padrão';
            l.className = isCustom ? 'badge bg-warning gen-label' : 'badge bg-secondary gen-label';
        });
        if (!isCustom) updateStepDefaults();
    }
    // Funções auxiliares para campos dinâmicos
    function addListField(containerId, fieldName) {
        const div = document.createElement('div');
        div.className = 'input-group mb-2';
        div.innerHTML = `<input type="text" class="form-control" name="${fieldName}"><button type="button" class="btn btn-outline-danger" onclick="this.parentElement.remove()">-</button>`;
        document.getElementById(containerId).appendChild(div);
    }

    function addAgentField(containerId, prefix) {
        const div = document.createElement('div');
        div.className = 'p-2 border rounded bg-light mb-2 position-relative';
        div.innerHTML = `
            <button type="button" class="btn-close position-absolute top-0 end-0 m-1" style="font-size: 0.5rem" onclick="this.parentElement.remove()"></button>
            <input type="text" class="form-control form-control-sm mb-1" name="${prefix}_name[]">
            <select class="form-select form-select-sm" name="${prefix}_type[]"><option value="Person">Pessoa</option><option value="Group">Grupo</option></select>
        `;
        document.getElementById(containerId).appendChild(div);
    }

    function addTermField() {
        const div = document.createElement('div');
        div.className = 'row g-2 mb-3 border-bottom pb-3';
        div.innerHTML = `
            <div class="col-md-4"><input type="text" class="form-control form-control-sm" name="term_name[]"></div>
            <div class="col-md-7"><input type="text" class="form-control form-control-sm" name="term_definition[]"></div>
            <div class="col-md-1"><button type="button" class="btn btn-sm btn-outline-danger w-100" onclick="this.parentElement.parentElement.remove()">-</button></div>
        `;
        document.getElementById('terms_container').appendChild(div);
        }

    document.getElementById('popForm').onsubmit = async (e) => {
        e.preventDefault();
        const formData = new FormData(e.target);
        const data = {
            metadata: {
                name: formData.get('name'), number: formData.get('number'), version: formData.get('version'),
                dates: { creation: formData.get('creationDate'), approval: formData.get('approvalDate'), revision: formData.get('revisionDate'), validity: formData.get('validity') },
                responsible: formData.getAll('responsible_org[]').map(org => ({ name: org, type: 'Organization' })),
                status: formData.get('status'), description: formData.get('description'),
                classifications: formData.getAll('classification[]'),
                terms: formData.getAll('term_name[]').map((name, i) => ({name: name, definition: formData.getAll('term_definition[]')[i]})),
            },
            agents: {
            creators: formData.getAll('creator_name[]').map((name, i) => ({ name, type: formData.getAll('creator_type[]')[i] })),
            checkers: formData.getAll('checker_name[]').map((name, i) => ({ name, type: formData.getAll('checker_type[]')[i] })),
            approvers: formData.getAll('approver_name[]').map((name, i) => ({ name, type: formData.getAll('approver_type[]')[i] }))
        },
            steps: formData.getAll('step_name[]').map((name, i) => ({
                name: name,
                performer: { name: formData.getAll('step_performer_name[]')[i], type: formData.getAll('step_performer_type[]')[i] },
                place: { name: formData.getAll('step_place_name[]')[i], type: formData.getAll('step_place_type[]')[i] },

            })),
            items: sopItemsList
        };
        try {
            const response = await fetch('http://localhost:5000/api/save-rdf', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data) });

            alert(result.message + " Arquivo: " + result.file);
