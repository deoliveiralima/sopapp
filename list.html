<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Lista de POPs - OntoSOP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light p-5">
<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2><i class="bi bi-list-ul"></i> Repositório de POPs</h2>
        <a href="/" class="btn btn-primary">+ Novo POP</a>
    </div>
    <div class="card shadow-sm">
        <div class="card-body">
            <table class="table table-hover">
                <thead class="table-light">
                    <tr>
                        <th>Nome do Procedimento</th>
                        <th>Status</th>
                        <th class="text-end">Ações</th>
                    </tr>
                </thead>
                <tbody id="popsTableBody">
                    <tr><td colspan="3" class="text-center">Carregando POPs...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    async function loadPops() {
        const response = await fetch('/api/pops');
        const data = await response.json();
        const tbody = document.getElementById('popsTableBody');
        tbody.innerHTML = data.length ? '' : '<tr><td colspan="3" class="text-center">Nenhum POP encontrado no GraphDB.</td></tr>';
        
        data.forEach(item => {
            tbody.innerHTML += `
                <tr>
                    <td class="fw-bold">${item.name.value}</td>
                    <td><span class="badge bg-info">${item.status ? item.status.value : 'N/A'}</span></td>
                    <td class="text-end">
                        <a href="/view/${item.id.value}" class="btn btn-sm btn-outline-dark">Visualizar Detalhes</a>
                    </td>
                </tr>`;
        });
    }
    loadPops();
</script>
</body>
</html>
