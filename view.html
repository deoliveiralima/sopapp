<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Visualizar POP - OntoSOP</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            background-color: #f4f6f9;
        }
        .section-title {
            border-bottom: 2px solid #0d6efd;
            padding-bottom: 6px;
            margin-bottom: 20px;
            font-weight: 600;
            color: #0d6efd;
        }
        .agent-badge {
            margin-right: 5px;
            margin-bottom: 5px;
        }
        .step-card {
            border-left: 5px solid #198754;
        }
        .meta-box {
            background: #f8f9fa;
            border-radius: 6px;
            padding: 15px;
        }
    </style>
</head>

<body class="p-4">

<div class="container bg-white shadow rounded p-5">

    <!-- Loading -->
    <div id="loading" class="text-center py-5">
        <div class="spinner-border text-primary"></div>
        <p class="mt-3">Consultando Base Semântica (GraphDB)...</p>
    </div>

    <!-- Conteúdo -->
    <div id="content" class="d-none">

        <!-- Cabeçalho -->
        <div class="d-flex justify-content-between align-items-start mb-4">
            <div>
                <h1 id="popName" class="fw-bold"></h1>
                <div class="meta-box mt-2">
                    <span class="me-3">
                        <strong>Status:</strong>
                        <span id="popStatus" class="badge bg-primary"></span>
                    </span>
                    <span>
                        <strong>Versão:</strong>
                        <span id="popVersion"></span>
                    </span>
                </div>
            </div>
            <a href="/list" class="btn btn-outline-secondary">
                <i class="bi bi-arrow-left"></i> Voltar
            </a>
        </div>

        <div class="row">

            <!-- COLUNA ESQUERDA -->
            <div class="col-md-4 border-end">

                <!-- Responsabilidades -->
                <h5 class="section-title">Responsabilidades</h5>

                <div class="mb-3">
                    <h6>Organizações Responsáveis</h6>
                    <div id="listResponsible"></div>
                </div>

                <div class="mb-3">
                    <h6>Elaborado por</h6>
                    <div id="listCreators"></div>
                </div>

                <div class="mb-3">
                    <h6>Revisado por</h6>
                    <div id="listCheckers"></div>
                </div>

                <div class="mb-3">
                    <h6>Aprovado por</h6>
                    <div id="listApprovers"></div>
                </div>

                <!-- Classificação -->
                <h5 class="section-title mt-4">Classificação (SKOS)</h5>
                <div id="listClassifications"></div>

                <!-- Glossário -->
                <h5 class="section-title mt-4">Glossário</h5>
                <div id="listTerms"></div>
            </div>

            <!-- COLUNA DIREITA -->
            <div class="col-md-8 ps-4">

                <!-- Descrição -->
                <h5 class="section-title">Descrição Geral</h5>
                <p id="popDesc" class="lead"></p>

                <!-- Itens -->
                <h5 class="section-title">Itens do Procedimento</h5>
                <div id="listItems"></div>

                <!-- Etapas -->
                <h5 class="section-title">Fluxo de Execução</h5>
                <div id="listSteps"></div>

            </div>
        </div>
    </div>
</div>

<script>
    const popId = window.location.pathname.split('/').pop();

    function renderBadges(list, containerId, color) {
        document.getElementById(containerId).innerHTML =
            list.length
                ? list.map(i => `<span class="badge ${color} agent-badge">${i}</span>`).join('')
                : '<span class="text-muted small">Não informado</span>';
    }

    async function renderPop() {
        const res = await fetch(`/api/pop/${popId}`);
        const data = await res.json();

        document.getElementById('loading').classList.add('d-none');
        document.getElementById('content').classList.remove('d-none');

        // Metadados
        document.getElementById('popName').innerText = data.metadata.name;
        document.getElementById('popStatus').innerText = data.metadata.status || 'N/A';
        document.getElementById('popVersion').innerText = data.metadata.version || '1.0';
        document.getElementById('popDesc').innerText = data.metadata.description || '';

        // Agentes
        renderBadges(data.agents.responsible, 'listResponsible', 'bg-dark');
        renderBadges(data.agents.creators, 'listCreators', 'bg-secondary');
        renderBadges(data.agents.checkers, 'listCheckers', 'bg-info text-dark');
        renderBadges(data.agents.approvers, 'listApprovers', 'bg-warning text-dark');

        // Classificações
        renderBadges(data.concepts.classifications, 'listClassifications', 'bg-success');

        // Glossário
        // No final do view.html, dentro de renderPop()
    document.getElementById('listTerms').innerHTML = data.concepts.terms.map(t => 
        `<strong>${t.name}:</strong> ${t.def}<br>`
    ).join('');

        // Itens agrupados por tipo
        const grouped = {};
        data.items.forEach(it => {
            if (!grouped[it.type]) grouped[it.type] = [];
            grouped[it.type].push(it);
        });

        let itemsHtml = '';
        Object.keys(grouped).forEach(type => {
            itemsHtml += `
                <h6 class="text-secondary mt-3">${type}</h6>
                <ul class="list-group mb-3">
                    ${grouped[type].map(it => `
                        <li class="list-group-item">
                            <span class="text-muted small me-2">#${it.order}</span>
                            ${it.name}
                        </li>
                    `).join('')}
                </ul>
            `;
        });
        document.getElementById('listItems').innerHTML = itemsHtml || '<p class="text-muted">Nenhum item registrado.</p>';

        // Etapas
        document.getElementById('listSteps').innerHTML = data.steps.map((s, i) => `
            <div class="card mb-3 step-card shadow-sm">
                <div class="card-body">
                    <h6 class="fw-bold text-success">Etapa ${i + 1}</h6>
                    <p class="mb-0">${s.name}</p>
                </div>
            </div>
        `).join('');
    }

    renderPop();
</script>

</body>
</html>
