<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Visualizar POP - OntoSOP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background-color: #f0f2f5; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .document-container { background: white; border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); margin-top: 2rem; margin-bottom: 2rem; border-top: 8px solid #0d6efd; }
        .section-header { border-bottom: 2px solid #e9ecef; padding-bottom: 8px; margin-bottom: 1.5rem; color: #0d6efd; font-weight: 700; text-transform: uppercase; font-size: 0.9rem; letter-spacing: 1px; }
        .meta-label { font-size: 0.75rem; font-weight: 700; color: #6c757d; text-transform: uppercase; display: block; }
        .step-number { background: #198754; color: white; width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; font-weight: bold; }
        .step-card { border: 1px solid #dee2e6; border-left: 5px solid #198754; transition: transform 0.2s; }
        .step-card:hover { transform: translateX(5px); }
        .pop-step { border-left-color: #0dcaf0; background-color: #f8fdff; }
        .condition-badge { font-size: 0.7rem; padding: 4px 8px; border-radius: 4px; }
    </style>
</head>
<body class="p-2 p-md-4">

<div class="container document-container p-4 p-md-5">
    <div class="d-flex justify-content-between align-items-center mb-5">
        <div class="d-flex align-items-center">
            <i class="bi bi-file-earmark-medical text-primary fs-1 me-3"></i>
            <div>
                <h1 id="popName" class="h3 fw-bold mb-1">Carregando...</h1>
                <span class="text-muted small">ID: <span id="displayId"></span></span>
            </div>
        </div>
        <div class="btn-group">
            <button onclick="window.print()" class="btn btn-outline-dark btn-sm"><i class="bi bi-printer"></i> Imprimir</button>
            <a href="/list" class="btn btn-primary btn-sm"><i class="bi bi-list-ul"></i> Repositório</a>
        </div>
    </div>

    <div class="row g-3 mb-5 p-3 bg-light rounded border">
        <div class="col-md-3 border-end">
            <span class="meta-label">Status do Documento</span>
            <span id="popStatus" class="badge rounded-pill bg-primary mt-1"></span>
        </div>
        <div class="col-md-3 border-end">
            <span class="meta-label">Versão Atual</span>
            <span id="popVersion" class="fw-bold text-dark"></span>
        </div>
        <div class="col-md-3 border-end">
            <span class="meta-label">Executor Principal</span>
            <span id="popExecutor" class="text-dark small fw-bold"></span>
        </div>
        <div class="col-md-3">
            <span class="meta-label">Local Principal</span>
            <span id="popLocal" class="text-dark small fw-bold"></span>
        </div>
    </div>

    <div class="row">
        <div class="col-lg-4 pe-lg-5 mb-5">
            <h6 class="section-header">Responsabilidades</h6>
            <div class="mb-4">
                <span class="meta-label mb-2">Unidade Responsável</span>
                <div id="listResponsible"></div>
            </div>
            <div class="row g-2 mb-4">
                <div class="col-6">
                    <span class="meta-label">Elaboração</span>
                    <div id="listCreators" class="mt-1"></div>
                </div>
                <div class="col-6">
                    <span class="meta-label">Revisão</span>
                    <div id="listCheckers" class="mt-1"></div>
                </div>
            </div>
            <div class="mb-4">
                <span class="meta-label">Aprovação Final</span>
                <div id="listApprovers" class="mt-1"></div>
            </div>

            <h6 class="section-header">Classificação</h6>
            <div id="listClassifications" class="mb-5"></div>

            <h6 class="section-header">Glossário Técnico</h6>
            <div id="listTerms" class="small text-muted"></div>
        </div>

        <div class="col-lg-8">
            <h6 class="section-header">Descrição do Procedimento</h6>
            <p id="popDesc" class="text-secondary mb-5" style="text-align: justify;"></p>

            <h6 class="section-header">Recursos e Referências (Itens)</h6>
            <div id="listItems" class="mb-5"></div>

            <h6 class="section-header">Fluxo Operacional (Etapas)</h6>
            <div id="listSteps"></div>
        </div>
    </div>
</div>

<script>
    const popId = window.location.pathname.split('/').pop();
    document.getElementById('displayId').innerText = popId;

    function renderBadges(list, containerId, colorClass) {
        const container = document.getElementById(containerId);
        if (!list || list.length === 0) {
            container.innerHTML = '<span class="text-muted small italic">Não definido</span>';
            return;
        }
        container.innerHTML = list.map(item => 
            `<span class="badge ${colorClass} me-1 mb-1 shadow-sm">${item}</span>`
        ).join('');
    }

    async function renderPop() {
        try {
            const res = await fetch(`/api/pop/${popId}`);
            const data = await res.json();

            // 1. Metadados Gerais
            document.getElementById('popName').innerText = data.metadata.name;
            document.getElementById('popStatus').innerText = data.metadata.status || 'DRAFT';
            document.getElementById('popVersion').innerText = data.metadata.version || '1.0';
            document.getElementById('popDesc').innerText = data.metadata.description || 'Nenhuma descrição fornecida.';
            
            // 2. Executor e Local do POP (Hierarquia Activity)
            document.getElementById('popExecutor').innerText = data.metadata.performer || 'Institucional';
            document.getElementById('popLocal').innerText = data.metadata.place || 'Não definido';

            // 3. Governança
            renderBadges(data.agents.responsible, 'listResponsible', 'bg-dark');
            renderBadges(data.agents.creators, 'listCreators', 'bg-secondary');
            renderBadges(data.agents.checkers, 'listCheckers', 'bg-outline-dark border text-dark');
            renderBadges(data.agents.approvers, 'listApprovers', 'bg-success');
            renderBadges(data.concepts.classifications, 'listClassifications', 'bg-info text-dark');

            // 4. Glossário (Lista de Definição)
            document.getElementById('listTerms').innerHTML = data.concepts.terms.length 
                ? data.concepts.terms.map(t => `<div class="mb-2"><strong class="text-dark">${t.name}:</strong> ${t.def}</div>`).join('')
                : 'Nenhum termo técnico registrado.';

            // 5. Itens do POP (Agrupados)
            const groupedItems = data.items.reduce((acc, it) => {
                acc[it.type] = acc[it.type] || [];
                acc[it.type].push(it);
                return acc;
            }, {});

            document.getElementById('listItems').innerHTML = Object.keys(groupedItems).length 
                ? Object.keys(groupedItems).map(type => `
                    <div class="mb-3">
                        <span class="text-uppercase small fw-bold text-muted">${type}</span>
                        <div class="list-group list-group-flush mt-1">
                            ${groupedItems[type].map(it => `<div class="list-group-item py-1 px-0 border-0"><i class="bi bi-dot"></i> ${it.name}</div>`).join('')}
                        </div>
                    </div>`).join('')
                : 'Sem itens registrados.';
 
            // 6. Fluxo de Etapas (com lógica e link para Sub-POP)
    
            // Localize o loop data.steps.map dentro de renderPop()
            // No view.html, dentro do loop document.getElementById('listSteps').innerHTML
            document.getElementById('listSteps').innerHTML = data.steps.map((s, i) => {
            // Verifica se a etapa aponta para um sub-processo
            const linkBtn = s.isSubPop 
                ? `<a href="/view/${s.id}" class="btn btn-sm btn-outline-info ms-2" style="font-size: 0.7rem;">
                    <i class="bi bi-box-arrow-up-right"></i> ACESSAR SUB-PROCESSO
                </a>` 
                : '';

            return `
            <div class="card mb-3 step-card ${s.isSubPop ? 'border-info bg-light' : ''} shadow-sm">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <div class="d-flex align-items-center">
                            <div class="step-number me-2">${s.order || (i + 1)}</div>
                            <h6 class="fw-bold mb-0">${s.name}</h6>
                        </div>
                        ${linkBtn}
                    </div>
                    
                    <div class="row g-2">
                        <div class="col-md-6">
                            <div class="p-2 border rounded bg-white">
                                <small class="meta-label"><i class="bi bi-person-gear"></i> Executor</small>
                                <span class="text-dark d-block fw-semibold">${s.performer}</span>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="p-2 border rounded bg-white">
                                <small class="meta-label"><i class="bi bi-geo-alt"></i> Local</small>
                                <span class="text-dark d-block fw-semibold">${s.place}</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>`;
        }).join('');

        } catch (error) {
            console.error("Erro ao renderizar POP:", error);
            document.body.innerHTML = `<div class="alert alert-danger m-5">Erro ao carregar o procedimento. Verifique se o backend está ativo.</div>`;
        }
    }
    renderPop();
</script>
</body>
</html>
